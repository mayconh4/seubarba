<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeuBarba</title>
<style>
  :root{
    --ink:#1c1c1e; --ink-2:#3a3a3c; --mut:#8e8e93; --accent:#26231F; --gold:#C2912E;
    --glass:rgba(255,255,255,.55); --glass-2:rgba(255,255,255,.4);
    --stroke:rgba(255,255,255,.6); --shadow:0 8px 30px rgba(31,38,75,.12);
    --pago:#34c759; --aguard:#ff9f0a; --cancel:#ff453a;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,sans-serif;
    color:var(--ink); min-height:100vh;
    background:
      radial-gradient(120% 120% at 0% 0%, #f0e4cf 0%, transparent 55%),
      radial-gradient(120% 120% at 100% 0%, #f3ddd0 0%, transparent 50%),
      radial-gradient(140% 140% at 100% 100%, #ecdcc4 0%, transparent 55%),
      radial-gradient(120% 120% at 0% 100%, #efe7d3 0%, transparent 55%),
      #f8f4ea;
    background-attachment:fixed;
  }
  .app{ max-width:440px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding:14px; }
  header{ display:flex; align-items:center; gap:8px; padding:8px 6px 16px; }
  .logo{ font-size:20px; font-weight:700; letter-spacing:-.02em; flex:1; cursor:pointer; user-select:none; }
  .logo:active{ opacity:.6; }
  .logo span{ color:#C2912E; }
  .switch{ font-size:12px; font-weight:600; color:var(--accent); cursor:pointer;
    background:var(--glass-2); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--stroke); border-radius:980px; padding:8px 13px; white-space:nowrap; }
  .switch.primary{ background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 14px rgba(0,0,0,.3); }
  .switch.icon{ display:flex; align-items:center; justify-content:center; width:38px; height:38px; padding:0; color:#A6791E; }
  .usermenu{ position:relative; }
  .menu{ position:absolute; right:0; top:46px; z-index:20; min-width:190px;
    background:rgba(255,255,255,.72); backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid var(--stroke); border-radius:18px; box-shadow:0 12px 36px rgba(31,38,75,.18); padding:6px; }
  .menu .mi{ display:flex; align-items:center; gap:10px; padding:12px 14px; font-size:15px; font-weight:600; color:var(--ink);
    border-radius:12px; cursor:pointer; }
  .menu .mi:hover{ background:rgba(0,0,0,.1); color:var(--accent); }
  .menu .mi svg{ width:18px; height:18px; opacity:.7; }
  .menu .sep{ height:1px; background:rgba(0,0,0,.06); margin:4px 8px; }
  .steps{ display:flex; gap:6px; padding:0 6px 16px; }
  .steps i{ flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,.5); transition:.3s; }
  .steps i.on{ background:var(--gold); }
  .panel{
    background:var(--glass); backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid rgba(194,145,46,.35); border-radius:28px; box-shadow:var(--shadow);
    padding:22px; flex:1; overflow:hidden;
  }
  .eyebrow{ font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#A6791E; margin-bottom:4px; }
  h1{ font-size:28px; font-weight:700; letter-spacing:-.03em; line-height:1.08; margin-bottom:20px; }
  .tile{
    display:flex; align-items:center; gap:14px; padding:15px 16px; margin-bottom:10px; cursor:pointer;
    background:rgba(255,255,255,.5); border:1px solid rgba(194,145,46,.30); border-radius:20px;
    transition:transform .12s, background .15s; box-shadow:0 2px 10px rgba(31,38,75,.05);
  }
  .tile:active{ transform:scale(.98); }
  .tile.sel{ background:var(--accent); border-color:var(--gold); color:#fff; box-shadow:0 8px 22px rgba(0,0,0,.30); }
  .tile.sel .sb,.tile.sel .pr,.tile.sel .tags{ color:rgba(255,255,255,.85); }
  .ic{ width:42px; height:42px; border-radius:14px; flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.12); color:var(--accent); font-weight:700; font-size:16px; }
  .tile.sel .ic{ background:rgba(255,255,255,.25); color:#fff; }
  .nm{ font-size:17px; font-weight:600; letter-spacing:-.01em; }
  .sb{ font-size:13px; color:var(--mut); margin-top:2px; }
  .tags{ font-size:12px; color:var(--mut); margin-top:3px; }
  .pr{ margin-left:auto; font-size:17px; font-weight:700; font-variant-numeric:tabular-nums; }
  .ar{ margin-left:auto; font-size:20px; opacity:.4; }
  .tile.sel .ar{ opacity:1; }
  .dayrow{ display:flex; gap:8px; overflow-x:auto; padding:2px 2px 8px; -webkit-overflow-scrolling:touch; }
  .daychip{ flex:0 0 auto; min-width:66px; text-align:center; padding:11px 10px; border-radius:16px; cursor:pointer;
    background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.7); transition:.12s; display:flex; flex-direction:column; gap:3px; }
  .daychip:active{ transform:scale(.95); }
  .daychip.sel{ background:var(--accent); color:#fff; border-color:var(--gold); box-shadow:0 6px 16px rgba(0,0,0,.30); }
  .dc-top{ font-size:13px; font-weight:700; text-transform:capitalize; }
  .dc-bot{ font-size:12px; opacity:.75; font-variant-numeric:tabular-nums; }
  .slots{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  @media (max-width:480px){
    .slots{ grid-template-columns:repeat(4,1fr); gap:8px; }
    .slot{ padding:11px 0; font-size:14px; }
  }
  .slot{ text-align:center; padding:15px 0; font-size:16px; font-weight:600; font-variant-numeric:tabular-nums; cursor:pointer;
    background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.7); border-radius:16px; transition:.12s; }
  .slot:active{ transform:scale(.95); }
  .slot.sel{ background:var(--accent); color:#fff; border-color:var(--gold); box-shadow:0 6px 16px rgba(0,0,0,.30); }
  .slot.off{ opacity:.4; color:var(--mut); text-decoration:line-through; cursor:not-allowed; box-shadow:none; }
  .slot.off:active{ transform:none; }
  .hint{ font-size:13px; color:var(--mut); margin-top:16px; line-height:1.5; }
  .btn{ width:100%; background:linear-gradient(135deg,#E7C767,#C2912E 55%,#A6791E); color:#2e1c06; border:1px solid #8a6a1e; padding:17px; font-size:16px; font-weight:600;
    border-radius:18px; cursor:pointer; margin-top:22px; box-shadow:0 8px 20px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.45); transition:.12s; }
  .btn:active{ transform:scale(.98); }
  .btn.out{ background:linear-gradient(135deg,#f2f3f5,#ccd0d6); color:#3d434c; border:1px solid #aab0b8; box-shadow:inset 0 1px 0 rgba(255,255,255,.6); }
  .center{ text-align:center; }
  .amt{ font-size:50px; font-weight:700; letter-spacing:-.04em; margin:8px 0 2px; font-variant-numeric:tabular-nums; }
  .timer{ font-size:14px; color:var(--mut); margin-bottom:22px; }
  .timer span{ font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; }
  .qrwrap{ width:190px; height:190px; margin:0 auto 18px; background:#fff; border:3px solid #C2912E; border-radius:24px; padding:16px;
    box-shadow:0 10px 30px rgba(31,38,75,.15); }
  .qr{ width:100%; height:100%; display:grid; grid-template-columns:repeat(21,1fr); grid-template-rows:repeat(21,1fr); gap:1px; }
  .lbl{ font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--mut); margin-bottom:8px; }
  .copy{ font-size:11px; font-family:ui-monospace,monospace; color:var(--ink-2); word-break:break-all; line-height:1.5;
    background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.7); border-radius:14px; padding:12px; }
  .ok{ background:rgba(52,199,89,.16); border:1px solid rgba(52,199,89,.4); border-radius:20px; padding:20px; margin-top:22px; }
  .ok b{ display:block; font-size:15px; font-weight:700; color:#1f8f3e; margin-bottom:4px; }
  .ok p{ font-size:13px; color:#2a6b3d; }
  /* ---- formulário ---- */
  .sechead{ font-size:13px; font-weight:700; letter-spacing:.02em; color:var(--ink); margin:22px 0 12px; display:flex; align-items:center; gap:8px; }
  .sechead:first-of-type{ margin-top:6px; }
  .sechead .n{ width:22px; height:22px; border-radius:50%; background:var(--accent); color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; font-weight:600; color:var(--ink-2); margin-bottom:5px; }
  .field label .req{ color:var(--cancel); }
  .field input, .field select{ width:100%; font-size:15px; font-family:inherit; color:var(--ink);
    background:rgba(255,255,255,.65); border:1px solid rgba(255,255,255,.8); border-radius:14px; padding:13px 14px; outline:none; transition:.15s; }
  .field input:focus, .field select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,0,0,.18); background:#fff; }
  .field input.err{ border-color:var(--cancel); box-shadow:0 0 0 3px rgba(255,69,58,.15); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid3{ display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:10px; }
  .formnote{ font-size:11px; color:var(--mut); margin-top:4px; line-height:1.5; }
  .errmsg{ background:rgba(255,69,58,.12); color:#c0271f; font-size:13px; font-weight:600; border-radius:14px; padding:12px 14px; margin-bottom:14px; }
  /* barbeiro */
  .tabbar{ display:flex; gap:6px; margin-top:12px; background:var(--glass-2); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid var(--stroke); border-radius:20px; padding:6px; }
  .tab{ flex:1; text-align:center; padding:11px 6px; font-size:12px; font-weight:600; color:var(--mut); cursor:pointer; border-radius:14px; transition:.15s; }
  .seg{ display:flex; gap:6px; background:rgba(255,255,255,.45); border:1px solid var(--stroke); border-radius:14px; padding:5px; margin-bottom:16px; }
  .segi{ flex:1; text-align:center; padding:9px; font-size:13px; font-weight:600; color:var(--mut); cursor:pointer; border-radius:10px; }
  .segi.on{ color:#A6791E; background:rgba(255,255,255,.8); box-shadow:0 2px 6px rgba(31,38,75,.08); }
  .chip.ok{ background:rgba(52,199,89,.18); color:#1f8f3e; }
  .btn.small{ width:auto; margin:0; padding:9px 16px; font-size:13px; border-radius:12px; }
  .rstar{ color:#C2912E; }
  .ratestars{ display:flex; gap:10px; justify-content:center; margin:20px 0 6px; }
  .rst{ cursor:pointer; color:#d6d8de; transition:transform .1s, color .15s; }
  .rst:active{ transform:scale(.9); }
  .rst.on{ color:#C2912E; }
  .rst svg{ width:42px; height:42px; }
  .ratelabel{ font-size:14px; font-weight:700; color:var(--ink-2); min-height:20px; margin-bottom:14px; }
  .rtarea{ width:100%; font-family:inherit; font-size:15px; color:var(--ink); resize:none; min-height:84px;
    background:rgba(255,255,255,.65); border:1px solid rgba(255,255,255,.8); border-radius:14px; padding:13px 14px; outline:none; }
  .rtarea:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,0,0,.18); background:#fff; }
  .tab.active{ color:#A6791E; background:rgba(255,255,255,.7); box-shadow:0 2px 8px rgba(31,38,75,.08); }
  .kpis{ display:grid; gap:10px; }
  .kpi{ display:flex; align-items:center; justify-content:space-between;
    background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.7); border-radius:18px; padding:16px 18px; }
  .kpi .v{ font-size:30px; font-weight:700; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .kpi .l{ font-size:13px; font-weight:600; color:var(--mut); }
  .ag{ display:flex; align-items:center; gap:14px; margin-bottom:10px;
    background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.7); border-radius:18px; padding:14px 16px; }
  .ag .hm{ font-size:16px; font-weight:700; width:52px; font-variant-numeric:tabular-nums; }
  .ag .who{ font-size:16px; font-weight:600; }
  .ag .sv{ font-size:12px; color:var(--mut); margin-top:2px; }
  .chip{ margin-left:auto; font-size:11px; font-weight:700; padding:5px 11px; border-radius:980px; }
  .fidwrap{ display:flex; align-items:center; gap:10px; border-top:1px solid rgba(0,0,0,.05); padding-top:11px; }
  .fid{ display:flex; gap:3px; flex:1; }
  .fseg{ flex:1; height:7px; border-radius:3px; background:rgba(0,0,0,.09); transition:.2s; }
  .fseg.on{ background:var(--gold); }
  .fseg.free{ background:var(--pago); }
  .fidlbl{ font-size:11px; font-weight:700; color:var(--mut); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .fidlbl.free{ color:#1f8f3e; }
  .wabtn{ display:inline-flex; align-items:center; gap:6px; text-decoration:none; font-size:13px; font-weight:700;
    color:#fff; background:#25d366; padding:9px 14px; border-radius:980px; box-shadow:0 4px 12px rgba(37,211,102,.35); }
  .wabtn:active{ transform:scale(.97); }
  .box{ background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.7); border-radius:18px; padding:16px 18px; }
  .boxtxt{ font-size:13px; color:var(--ink-2); line-height:1.5; }
  .slrow{ display:flex; align-items:center; justify-content:space-between; margin:16px 0 8px; }
  .sllbl{ font-size:13px; font-weight:600; color:var(--ink-2); }
  .slval{ font-size:24px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }
  .slval input{ font-size:22px; font-weight:700; color:var(--accent); font-family:inherit; border:1px solid rgba(255,255,255,.8);
    background:rgba(255,255,255,.7); border-radius:10px; padding:4px 8px; outline:none; }
  .slval input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,0,0,.15); }
  .iconbtn{ width:30px; height:30px; flex:0 0 auto; border:none; border-radius:50%; cursor:pointer; font-size:20px; line-height:1;
    background:rgba(255,69,58,.12); color:var(--cancel); display:flex; align-items:center; justify-content:center; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:980px;
    background:rgba(0,0,0,.2); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:24px; height:24px; border-radius:50%;
    background:var(--accent); cursor:pointer; box-shadow:0 3px 8px rgba(0,0,0,.4); border:3px solid #fff; }
  input[type=range]::-moz-range-thumb{ width:22px; height:22px; border-radius:50%; background:var(--accent);
    cursor:pointer; border:3px solid #fff; }
  .bar{ height:10px; background:rgba(255,255,255,.6); border-radius:980px; overflow:hidden; margin:14px 0 8px; }
  .bar > div{ height:10px; background:var(--accent); border-radius:980px; }
  .lr{ display:flex; justify-content:space-between; padding:13px 16px; margin-bottom:8px; font-size:14px; font-weight:500;
    background:rgba(255,255,255,.45); border:1px solid rgba(255,255,255,.6); border-radius:16px; }
  .lr .c{ color:var(--mut); font-variant-numeric:tabular-nums; }
  .lr b{ font-weight:600; }
  h1.bg{ margin-bottom:14px; }
  .badge{ display:inline-block; font-size:11px; font-weight:700; padding:5px 11px; border-radius:980px;
    background:rgba(255,159,10,.2); color:#a86400; margin-bottom:14px; }
  .badge.ok{ background:rgba(52,199,89,.18); color:#1f8f3e; }
  .tile.off{ opacity:.5; }
  .herologo{ text-align:center; margin:2px 0 16px; }
  .herologo img{ width:58%; max-width:180px; border-radius:16px; filter:drop-shadow(0 6px 16px rgba(0,0,0,.28)); }
  /* spinner de aguardando pagamento */
  .spin{ width:18px; height:18px; border-radius:50%; border:2.5px solid rgba(0,0,0,.15); border-top-color:var(--gold,#A6791E); animation:spin .8s linear infinite; flex:none; display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo" id="brand" role="button" tabindex="0" title="Ir para o início" aria-label="SeuBarba — ir para o início">Seu<span>Barba</span></div>
    <span class="switch icon" id="backBtn" title="Voltar" aria-label="Voltar" style="display:none">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M15.4 4.6a1 1 0 0 1 0 1.4L9.4 12l6 6a1 1 0 0 1-1.4 1.4l-6.7-6.7a1 1 0 0 1 0-1.4l6.7-6.7a1 1 0 0 1 1.4 0Z"/></svg>
    </span>
    <div class="usermenu">
      <span class="switch icon" id="userBtn" title="Menu" aria-label="Menu">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.4a4 4 0 1 1 0 8 4 4 0 0 1 0-8ZM4.8 20c0-3.9 3.2-6 7.2-6s7.2 2.1 7.2 6c0 .6-.5 1-1 1H5.8c-.6 0-1-.4-1-1Z"/></svg>
      </span>
      <div class="menu" id="menu" hidden></div>
    </div>
  </header>
  <div class="steps" id="steps"><i></i><i></i><i></i><i></i></div>
  <div class="panel"><main id="main"></main></div>
  <div class="tabbar" id="tabbar" style="display:none">
    <div class="tab" data-tab="dash">Resumo</div>
    <div class="tab" data-tab="agenda">Agenda</div>
    <div class="tab" data-tab="equipe" id="tabEquipe">Equipe</div>
    <div class="tab" data-tab="metas">Metas</div>
    <div class="tab" data-tab="rede">Rede</div>
    <div class="tab" data-tab="conta">Conta</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let barbers = [
  { id:"b1", nome:"João Silva", esp:["Fade","Barba","Social"], pct:.4 },
  { id:"b2", nome:"Pedro Santos", esp:["Degradê","Navalhado","Pigmentação"], pct:.4 },
];
let services = [
  { id:"s1", nome:"Corte Masculino", preco:45, dur:30 },
  { id:"s2", nome:"Corte + Barba", preco:60, dur:45 },
  { id:"s3", nome:"Barba", preco:30, dur:30 },
  { id:"s4", nome:"Pigmentação", preco:50, dur:60 },
  { id:"s5", nome:"Sobrancelha", preco:20, dur:15 },
];
const horario = { abre:8, fecha:19, almocoIni:12, almocoFim:13 };
let appointments = [
  { id:"a1", barbeiro:"b1", cliente:"Carlos", service:"s1", min:8*60+30, valor:45, status:"pago", zap:"11988880001" },
  { id:"a2", barbeiro:"b1", cliente:"Pedro",  service:"s2", min:9*60,    valor:60, status:"pago", zap:"11988880002" },
  { id:"a3", barbeiro:"b1", cliente:"Rafael", service:"s1", min:10*60,   valor:45, status:"aguardando", zap:"11988880003" },
  { id:"a4", barbeiro:"b1", cliente:"Bruno",  service:"s4", min:14*60,   valor:50, status:"pago", zap:"11988880004" },
  { id:"a5", barbeiro:"b1", cliente:"Tiago",  service:"s3", min:15*60,   valor:30, status:"cancelado", zap:"11988880005" },
];

// barbearias disponíveis para o cliente escolher (com coordenadas p/ "mais próxima")
let barbershops = [];
function distKm(la1,lo1,la2,lo2){ const R=6371,toR=x=>x*Math.PI/180; const dla=toR(la2-la1),dlo=toR(lo2-lo1); const a=Math.sin(dla/2)**2+Math.cos(toR(la1))*Math.cos(toR(la2))*Math.sin(dlo/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
function acharMaisProxima(){
  const fb=document.getElementById("geoMsg"); if(!fb) return;
  if(!navigator.geolocation){ fb.textContent="Seu navegador não suporta localização. Escolha manualmente abaixo."; return; }
  fb.textContent="Localizando você...";
  navigator.geolocation.getCurrentPosition(pos=>{
    const la=pos.coords.latitude, lo=pos.coords.longitude;
    const comSlots=barbershops.filter(s=>s.slots && s.barbers && s.barbers.length);
    let best=null,bd=Infinity;
    comSlots.forEach(s=>{ const d=distKm(la,lo,s.lat,s.lng); if(d<bd){bd=d;best=s;} });
    if(!best){ fb.textContent="Nenhuma barbearia com horários por perto agora."; return; }
    best._dist=bd; S.shop=best; S.step=1; S.barber=null; S.service=null; S.time=null; render();
  }, ()=>{ fb.textContent="Não consegui acessar sua localização. Permita o acesso ou escolha manualmente."; });
}

// perfil cadastrado da barbearia/barbeiro (vazio até cadastrar)
let profile = null;
// perfil de freelancer persistido por conta (localStorage)
function freelaKey(){ return "sb_freela_"+(S.authEmail||"").toLowerCase(); }
function saveFreela(d){ try{ localStorage.setItem(freelaKey(), JSON.stringify(d)); }catch(e){} }
function loadFreela(){ try{ const r=localStorage.getItem(freelaKey()); return r?JSON.parse(r):null; }catch(e){ return null; } }
function clearFreela(){ try{ localStorage.removeItem(freelaKey()); }catch(e){} }
// captura a localização (GPS) do studio no cadastro
function obGeo(){
  const msg = document.getElementById("obGeoMsg");
  if(!navigator.geolocation){ if(msg) msg.textContent="Seu navegador não suporta localização."; return; }
  if(msg) msg.textContent="Obtendo sua localização…";
  obReadStep();
  navigator.geolocation.getCurrentPosition(function(pos){
    S.obDraft.lat = pos.coords.latitude; S.obDraft.lng = pos.coords.longitude;
    render();
  }, function(){ if(msg) msg.textContent="Não consegui acessar o GPS. Permita o acesso à localização e tente de novo."; });
}
// adiciona/atualiza a localização de uma barbearia já cadastrada (aba Conta)
function shopGeo(shopId){
  const msg = document.getElementById("shopGeoMsg_"+shopId);
  if(!navigator.geolocation){ if(msg) msg.textContent="Seu navegador não suporta localização."; return; }
  if(msg) msg.textContent="Obtendo sua localização…";
  navigator.geolocation.getCurrentPosition(async function(pos){
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    try{
      const { error } = await sb.from("shops").update({ lat, lng }).eq("id", shopId);
      if(error){ if(msg) msg.textContent="Não deu para salvar: "+(error.message||"erro"); return; }
      (S.myShops||[]).forEach(function(sp){ if(sp.id===shopId){ sp.lat=lat; sp.lng=lng; } });
      if(S.dashShop && S.dashShop.id===shopId){ S.dashShop.lat=lat; S.dashShop.lng=lng; }
      render();
    }catch(e){ if(msg) msg.textContent="Não deu para salvar a localização."; }
  }, function(){ if(msg) msg.textContent="Não consegui acessar o GPS. Permita o acesso à localização."; });
}

// redimensiona a imagem escolhida para 96px e salva
document.addEventListener("change", function(e){
  const inp = e.target; if(!inp || !inp.dataset || !inp.dataset.av || !inp.files || !inp.files[0]) return;
  const scope = inp.dataset.av, f = inp.files[0];
  const img = new Image();
  img.onload = function(){
    const c = document.createElement("canvas"); const s = 96;
    c.width = s; c.height = s;
    const r = Math.max(s/img.width, s/img.height);
    const w = img.width*r, h2 = img.height*r;
    c.getContext("2d").drawImage(img, (s-w)/2, (s-h2)/2, w, h2);
    const data = c.toDataURL("image/jpeg", .82);
    try{ localStorage.setItem(avatarKey(scope), data); }catch(err){}
    // foto do studio também fica visível para o cliente no fluxo de agendamento
    if(scope==="studio" && S.dashShop){
      setShopFoto(S.dashShop.id, data);
      // persiste no banco: sobrevive à limpeza do navegador e aparece em qualquer aparelho
      try{ sb.from("shops").update({ foto:data }).eq("id", S.dashShop.id).then(function(r){ if(r&&r.error) console.log("foto no banco:", r.error.message); }); }catch(err){}
    }
    URL.revokeObjectURL(img.src);
    // no cadastro, preserva o que já foi digitado antes de redesenhar
    if(S.role==="onboarding") obReadStep();
    render();
  };
  img.src = URL.createObjectURL(f);
});

// Retorna TODOS os horários do dia com o status de cada um.
// { m: minutos, ok: disponível?, motivo: 'passou' | 'almoco' | 'ocupado' | '' }
function slotsStatus(barbeiroId, dur, passo, hor, minMin){
  passo = passo||30; hor = hor||horario; minMin = minMin||0;
  const ocup = appointments.filter(a => (barbeiroId==="any"||a.barbeiro===barbeiroId) && a.status!=="cancelado")
    .map(a => ({ ini:a.min, fim:a.min + (services.find(s=>s.id===a.service)?.dur||30) }));
  const out=[];
  for(let m=hor.abre*60; m+dur<=hor.fecha*60; m+=passo){
    const fim=m+dur; let ok=true, motivo="";
    if(m < minMin){ ok=false; motivo="passou"; }
    if(ok && hor.almocoIni!=null && hor.almocoFim!=null && m < hor.almocoFim*60 && hor.almocoIni*60 < fim){ ok=false; motivo="almoco"; }
    if(ok){ for(const o of ocup){ if(m<o.fim && o.ini<fim){ ok=false; motivo="ocupado"; break; } } }
    out.push({ m:m, ok:ok, motivo:motivo });
  }
  return out;
}

const DIAS_SEM = ["dom","seg","ter","qua","qui","sex","sab"];        // índice = Date.getDay()
const DIAS_ABBR = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
function isoDia(d){ return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); }
function proximosDias(shop, janela, max){
  const abertos = (shop && shop.dias && shop.dias.length) ? shop.dias : DIAS_SEM;
  const base = new Date(); base.setHours(0,0,0,0);
  const out=[];
  for(let i=0; i<janela && out.length<(max||10); i++){
    const d = new Date(base); d.setDate(base.getDate()+i);
    if(abertos.indexOf(DIAS_SEM[d.getDay()])>=0) out.push(d);
  }
  return out;
}
function labelDia(iso){
  const d = new Date(iso+"T00:00:00");
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diff = Math.round((d-hoje)/86400000);
  const top = diff===0 ? "Hoje" : diff===1 ? "Amanhã" : DIAS_ABBR[d.getDay()];
  return { top: top, bot: ("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2) };
}

// confirmação do pagamento: usada pelo botão "Já paguei" e pelo polling do Asaas
function confirmarPagamento(){
  if(S.paid) return;
  S.paid=true;
  clearInterval(pixPoll); clearPixPending(); S.pixCreated=null;
  const nomeCli = (S.payer&&S.payer.nome)||"Você";
  const pvPay = precoCliente();
  appointments.push({ id:"new", barbeiro:S.barber==="any"?"b1":S.barber, cliente:nomeCli, service:S.service.id, min:S.time, dia:S.dia, valor:pvPay.final, status:"pago" });
  // o desconto vale para um corte: consumido após o pagamento
  if(pvPay.pct){ const alvo=nomeCli.trim().toLowerCase(); Object.keys(descontos).forEach(n=>{ if(n.trim().toLowerCase()===alvo) delete descontos[n]; }); saveDescontos(); }
  let c=(fidelidade[nomeCli]||0); c = (c%10===0 && c>0) ? 1 : c+1; fidelidade[nomeCli]=c;
  clearInterval(timerInt);
  const wa = waAgendamento();
  const waBtn = wa ? `<a class="btn" href="${wa}" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none;background:linear-gradient(135deg,#25d366,#1da851);color:#fff;border-color:#1da851;margin-top:14px">Avisar a barbearia no WhatsApp</a>` : "";
  const extra = wa ? " Toque no botão verde para avisar a barbearia pelo WhatsApp." : "";
  const box = document.getElementById("paybox");
  if(box) box.innerHTML=`<div class="ok"><b>Pagamento confirmado</b><p>Seu horário está reservado.${extra} Após o corte, avalie o atendimento.</p></div>${waBtn}<button class="btn out" data-a="rate" style="margin-top:12px">Avaliar atendimento</button><button class="btn out" data-a="reset">Novo agendamento</button>`;
}
// copia o código PIX e mostra o carregamento até o Asaas confirmar o pagamento
function copiarPix(){
  const cod = (S.pixData && S.pixData.copiaECola) || (document.querySelector(".copy")||{}).textContent || "";
  const done = ()=>{
    S.aguardandoPix=true;
    const box=document.getElementById("paybox");
    if(box) box.innerHTML=`<div class="hint" style="text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 0">
      <span class="spin"></span> Código copiado! Aguardando a confirmação do pagamento…</div>
      <button class="btn out" data-a="pay" style="margin-top:6px">Já paguei (confirmar manualmente)</button>`;
  };
  if(navigator.clipboard && cod) navigator.clipboard.writeText(cod).then(done).catch(done);
  else done();
}
// pergunta ao Asaas (via Edge Function) se o PIX já foi pago
let pixPoll;
function startPixPoll(){
  clearInterval(pixPoll);
  if(!S.pixData || !S.pixData.paymentId) return;
  pixPoll = setInterval(async ()=>{
    if(S.paid || !S.pixGen){ clearInterval(pixPoll); return; }
    try{
      const r = await fetch(FN_PIX, { method:"POST",
        headers:{ "Content-Type":"application/json", "apikey": SB_KEY, "Authorization":"Bearer "+SB_KEY },
        body: JSON.stringify({ paymentId: S.pixData.paymentId }) });
      const d = await r.json();
      if(d && (d.status==="RECEIVED" || d.status==="CONFIRMED" || d.status==="RECEIVED_IN_CASH")) confirmarPagamento();
    }catch(e){}
  }, 4000);
}
// PIX pendente: sobrevive ao fechamento do navegador até expirar (5 min)
const PIX_TTL = 300; // segundos
function savePixPending(){
  try{ localStorage.setItem("sb_pix_pend", JSON.stringify({
    pixData:S.pixData||null, payer:S.payer, serviceId:S.service&&S.service.id,
    shopId:S.shop&&S.shop.id, barber:S.barber, dia:S.dia, time:S.time, created:S.pixCreated||Date.now()
  })); }catch(e){}
}
function clearPixPending(){ try{ localStorage.removeItem("sb_pix_pend"); }catch(e){} }
let _pixRestored=false;
function restorePixPending(){
  if(_pixRestored) return; _pixRestored=true;
  let p=null; try{ p=JSON.parse(localStorage.getItem("sb_pix_pend")||"null"); }catch(e){}
  if(!p || !p.created) return;
  const left = PIX_TTL - Math.floor((Date.now()-p.created)/1000);
  if(left<=0){ clearPixPending(); return; }
  const svc = services.find(function(x){ return x.id===p.serviceId; });
  const shp = barbershops.find(function(x){ return x.id===p.shopId; });
  if(!svc || !shp){ clearPixPending(); return; }
  S.role="client"; S.shop=shp; S.service=svc; S.barber=p.barber; S.dia=p.dia; S.time=p.time; S.payer=p.payer;
  S.step=4; S.pixGen=true; S.paid=false; S.pixTried=true; S.pixData=p.pixData; S.pixCreated=p.created;
  render(); startPixPoll();
}
let timerInt;
function startTimer(){
  clearInterval(timerInt);
  let t = S.pixCreated ? Math.max(0, PIX_TTL - Math.floor((Date.now()-S.pixCreated)/1000)) : PIX_TTL;
  const el=document.getElementById("timer");
  const tick=()=>{ if(el) el.textContent=String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0"); };
  tick();
  timerInt=setInterval(()=>{ t--; if(t<=0){clearInterval(timerInt); if(el)el.textContent="00:00"; clearPixPending(); return;} tick(); },1000);
}

function field(id,label,{req=true,type="text",ph="",val="",opts=null}={}){
  const star = req?` <span class="req">*</span>`:"";

// dd/mm/aaaa -> aaaa-mm-dd (formato aceito pelo banco); null se vazio/incompleto
function brDateToISO(v){
  const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(v||"");
  return m ? m[3]+"-"+m[2]+"-"+m[1] : null;
}

  const pct = descDe(e.target.value), base = S.service.preco;
  const el = document.getElementById("pgPreco"), msg = document.getElementById("pgDescMsg");

document.addEventListener("input", function(e){
  if(!e.target || e.target.id!=="birthDate") return;
  const d = e.target.value.replace(/\D/g,"").slice(0,8);

const HORAS = (function(){ var a=[]; for(var h=6;h<=23;h++){ var t=(h<10?"0"+h:""+h)+":00"; a.push({v:t,t:t}); } return a; })();
const HORAS_OPC = [{v:"",t:"Sem almoço"}].concat(HORAS);
const DIAS = [{k:"seg",t:"Seg"},{k:"ter",t:"Ter"},{k:"qua",t:"Qua"},{k:"qui",t:"Qui"},{k:"sex",t:"Sex"},{k:"sab",t:"Sáb"},{k:"dom",t:"Dom"}];
const CATALOGO = [
  { key:"corte", nome:"Corte Masculino", preco:45, dur:30, cat:"cabelo" },
  { key:"cortebarba", nome:"Corte + Barba", preco:60, dur:45, cat:"cabelo" },
  { key:"barba", nome:"Barba", preco:30, dur:30, cat:"barba" },
  { key:"pigmentacao", nome:"Pigmentação", preco:50, dur:60, cat:"estetica" },
  { key:"sobrancelha", nome:"Sobrancelha", preco:20, dur:15, cat:"sobrancelha" },
  { key:"navalha", nome:"Acabamento na navalha", preco:25, dur:20, cat:"cabelo" },
  { key:"platinado", nome:"Platinado / Descoloração", preco:120, dur:120, cat:"cabelo" },
  { key:"infantil", nome:"Corte Infantil", preco:35, dur:30, cat:"cabelo" },
];
const OB_FIELDS = {
  barbearia: ["nomeFantasia","cpfCnpj","companyType","incomeValue"],
  dados: ["respNome","cpfCnpj","companyType","email","mobilePhone","birthDate"],
  endereco: ["postalCode","addressNumber","address","province"],
  horarios: ["abre","fecha","almocoIni","almocoFim"],
};
function obVal(id){ return (S.obDraft && S.obDraft[id]!==undefined) ? S.obDraft[id] : ((profile && profile[id]) || ""); }
function obReadColabs(){
  (S.obDraft.colabs||[]).forEach(function(co,i){
    const n=document.getElementById("co_nome_"+i); if(n) co.nome=n.value;
    const t=document.getElementById("co_tel_"+i); if(t) co.tel=t.value;
    const c=document.getElementById("co_com_"+i); if(c) co.com=Number(c.value)||0;
    if(!co.svc) co.svc={};
    Object.keys(co.svc).forEach(function(k){ const d=document.getElementById("co_dur_"+i+"_"+k); if(d) co.svc[k].dur=Number(d.value)||co.svc[k].dur; });
  });
}
function obReadStep(){
  const key = S.obStep;
  if(key==="servicos"){ if(S.obDraft.svc){ Object.keys(S.obDraft.svc).forEach(function(k){ const d=document.getElementById("osvcdur_"+k); if(d) S.obDraft.svc[k].dur=Number(d.value)||S.obDraft.svc[k].dur; }); } return; }
  if(key==="equipe"){ obReadColabs(); return; }
  if(key==="qtd" || key==="modelo" || key==="freelancers") return;
  (OB_FIELDS[key]||[]).forEach(function(id){ const el=document.getElementById(id); if(el) S.obDraft[id]=el.value.trim(); });
}
function obValidStep(){
  const key = S.obStep;
  if(key==="modelo"){ if(!S.obDraft.modelo){ formErr("Escolha como você atende."); return false; } return true; }
  if(key==="servicos"){ if(!S.obDraft.svc || !Object.keys(S.obDraft.svc).length){ formErr("Selecione ao menos um serviço."); return false; } return true; }
  if(key==="qtd"){ if(!(S.obDraft.nColab>=1)){ formErr("Informe ao menos 1 colaborador."); return false; } return true; }
  if(key==="equipe"){
    const bad=(S.obDraft.colabs||[]).some(function(c){ return !c.nome || !c.nome.trim(); });
    if(bad){ formErr("Preencha o nome de todos os colaboradores."); return false; } return true;
  }
  if(key==="freelancers"){ return true; }
  if(key==="horarios"){ if(!S.obDraft.dias || !S.obDraft.dias.length){ formErr("Selecione ao menos um dia de atendimento."); return false; } return true; }
  let firstErr=null;
  (OB_FIELDS[key]||[]).forEach(function(id){
    const el=document.getElementById(id); if(!el) return;
    if(el.dataset.req==="1" && !el.value.trim()){ el.classList.add("err"); if(!firstErr) firstErr=el; }
    else el.classList.remove("err");
  });
  if(key==="dados"){ const em=document.getElementById("email"); if(em && em.value && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em.value)){ em.classList.add("err"); if(!firstErr) firstErr=em; } }
  if(firstErr){ formErr("Preencha os campos destacados."); firstErr.focus(); return false; }
  // foto é obrigatória: sem ela a barbearia/freelancer não fica ativa
  if(key==="barbearia" && !getAvatar("studio")){ formErr("Adicione uma foto do seu studio — sem foto a barbearia não fica ativa para os clientes."); return false; }
  if(key==="dados" && S.barberType==="freelancer" && !getAvatar("freela")){ formErr("Adicione uma foto de perfil — sem foto seu perfil não fica ativo para as barbearias."); return false; }
  return true;
}
// navega pelo fluxo dinâmico de etapas
function obGo(dir){
  const seq = obSteps(); let i = seq.indexOf(S.obStep); if(i<0) i=0;
  const ni = i + dir;
  if(ni < 0) return;
  if(ni >= seq.length){ saveOnboarding(); return; }
  S.obStep = seq[ni]; render();
}
async function saveOnboarding(){
  const d = S.obDraft || {};
  d.tipo = S.barberType||"dono";
  let ok = false, uid = null, newShopId = null;
  try{ const { data } = await sb.auth.getSession(); uid = data && data.session && data.session.user ? data.session.user.id : null; }catch(e){}
  if(!uid){
    S.role="account"; S.accStage="signup"; render();
    setTimeout(function(){ const el=document.getElementById("accerr"); if(el) el.innerHTML='<div class="errmsg">Crie sua conta (ou entre) para concluir seu cadastro.</div>'; }, 60);
    return;
  }
  // Freelancer: não cria barbearia — salva o perfil e abre o painel de oportunidades
  if(d.tipo==="freelancer"){
    profile = d;
    saveFreela(d);
    S.obStep=null; S.obDraft=null;
    S.freelaAviso = true;
    S.role="barber"; S.tab="rede"; S.redeView=null;
    render();
    return;
  }
  if(sb){
    try{
      // Cadastro por partes: aqui gravamos APENAS a barbearia. Equipe e serviços
      // são configurados depois no menu da barbearia (Minha conta > Minhas barbearias).
      const { data: shopRow, error } = await sb.from("shops").insert({
        owner_id: uid, nome: d.nomeFantasia, bairro: d.province || "", ativo: false,
        cpf_cnpj: d.cpfCnpj, tipo_empresa: d.companyType, faturamento: Number(d.incomeValue)||null,
        responsavel: d.respNome, email: d.email, telefone: d.mobilePhone, nascimento: brDateToISO(d.birthDate),
        cep: d.postalCode, logradouro: d.address, numero: d.addressNumber,
        lat: (d.lat!=null?d.lat:null), lng: (d.lng!=null?d.lng:null),
        abre: (d.abre?parseInt(d.abre.split(":")[0],10):8), fecha: (d.fecha?parseInt(d.fecha.split(":")[0],10):19),
        almoco_ini: (d.almocoIni?parseInt(d.almocoIni.split(":")[0],10):null), almoco_fim: (d.almocoFim?parseInt(d.almocoFim.split(":")[0],10):null),
        dias: d.dias||[]
      }).select("id").single();
      ok = !error && !!shopRow;
      if(error){ console.log("cadastro erro:", error); S.cadastroErro = error.message || String(error); }
      else if(shopRow) newShopId = shopRow.id;
    }catch(e){ console.log("cadastro excecao:", e); S.cadastroErro = (e&&e.message)||String(e); }
  }
  profile = d;
  S.obStep=null; S.obDraft=null;
  S.cadastroOk = ok;
  S.myShops = undefined;
  // Cadastrou como barbeiro -> cai direto no painel administrativo da barbearia
  if(ok && newShopId){ S.cadastroAviso = true; openDash(newShopId); return; }
  S.role = "cadastroEnviado";
  render();
}
function renderCadastroEnviado(){
  tabbar.style.display="none"; steps.style.display="none";
  if(S.cadastroOk){
    main.innerHTML = `<div class="center" style="padding-top:16px">
      <div class="eyebrow">Cadastro</div><h1 class="bg">Barbearia cadastrada!</h1>
      <div class="ok"><b>Em análise</b><p>Sua barbearia foi enviada para aprovação. Agora configure a sua equipe, os serviços e os horários no menu da barbearia.</p></div>

async function refreshAuth(){ try{ const {data}=await sb.auth.getSession(); S.authEmail = data&&data.session&&data.session.user ? (data.session.user.email||"") : ""; }catch(e){ S.authEmail=""; } }
function accCreds(){ const e=document.getElementById("accEmail"), p=document.getElementById("accPass"); return { email:(e?e.value.trim().toLowerCase():""), pass:(p?p.value:""), e, p }; }
function accErr(msg){ const el=document.getElementById("accerr"); if(el) el.innerHTML=`<div class="errmsg">${msg}</div>`; }
async function doLogin(){
  const {email,pass,e,p}=accCreds();
  if(!email){ if(e)e.classList.add("err"); return; } if(!pass){ if(p)p.classList.add("err"); return; }
  S.loginEmail=email;
  S.loginPending=true;   // login explícito: pode redirecionar para "Minha conta"
  try{ const { error } = await sb.auth.signInWithPassword({ email, password:pass }); if(error){ S.loginPending=false; accErr("E-mail ou senha inválidos."); } }
  catch(err){ S.loginPending=false; accErr("Erro ao entrar. Tente de novo."); }
}
async function doSignup(){
  const {email,pass,e,p}=accCreds();
  if(!email){ if(e)e.classList.add("err"); return; }
  if(!pass || pass.length<6){ if(p)p.classList.add("err"); accErr("A senha precisa ter ao menos 6 caracteres."); return; }
  S.loginEmail=email;
  S.loginPending=true;   // cadastro explícito: pode redirecionar para "Minha conta"
  try{
    const { data, error } = await sb.auth.signUp({ email, password:pass });
    if(error){ S.loginPending=false; accErr(error.message); return; }
    if(!data.session){ S.loginPending=false; S.accStage="login"; render(); accErr("Conta criada! Confirme pelo e-mail (se pedido) e entre."); return; }
  }catch(err){ S.loginPending=false; accErr("Erro ao criar conta."); }
}
async function accLogout(){ try{ await sb.auth.signOut(); }catch(e){} S.authEmail=""; S.myShops=undefined; S.myShopsPromise=null; S.accStage="home"; goHome(); }

      <div class="boxtxt">Assine para manter sua barbearia ativa na plataforma: <b>R$ 59,90/mês</b> + taxa por transação, cobrado automaticamente no cartão todo mês.</div>
      <button class="btn" data-a="planForm" style="margin:10px 0 0">Vincular cartão e ativar</button></div>`;
  }
  return h + `<div class="box" style="margin-bottom:10px">
    <div class="field"><label>Nome impresso no cartão</label><input id="plNome" placeholder="Como está no cartão" value="${(profile&&profile.respNome)||sp.responsavel||""}"></div>
    <div class="field"><label>Número do cartão</label><input id="plNum" type="tel" placeholder="0000 0000 0000 0000"></div>
    <div class="grid2">
      <div class="field"><label>Validade (MM/AA)</label><input id="plVal" type="tel" placeholder="MM/AA"></div>
      <div class="field"><label>CVV</label><input id="plCvv" type="tel" placeholder="000" maxlength="4"></div>
    </div>
    <div class="boxtxt" style="margin-bottom:10px">Cobrança recorrente de <b>R$ 59,90/mês</b> no cartão, direto pela Asaas. Cancele quando quiser.</div>
    <div class="hint" id="planMsg" style="margin:0 0 8px"></div>
    <button class="btn" data-a="planSubscribe" style="margin:0">Ativar plano — R$ 59,90/mês</button>
    <button class="btn out" data-a="planFormOff" style="margin-top:8px">Voltar</button></div>`;
}
function planMsg(t){ const el=document.getElementById("planMsg"); if(el) el.innerHTML=t; }
async function planSubscribe(){
  const sp = S.dashShop || (S.myShops&&S.myShops[0]); if(!sp) return;
  const g=id=>{ const el=document.getElementById(id); return el?el.value.trim():""; };
  const nome=g("plNome"), num=g("plNum").replace(/\D/g,""), val=g("plVal"), cvv=g("plCvv");
  const mm=(/^(\d{2})\D?(\d{2,4})$/.exec(val)||[])[1], aa=(/^(\d{2})\D?(\d{2,4})$/.exec(val)||[])[2];
  if(!nome||num.length<13||!mm||!aa||cvv.length<3){ planMsg('<span style="color:var(--cancel)">Confira os dados do cartão.</span>'); return; }
  planMsg('<span class="spin" style="vertical-align:middle"></span> Ativando plano…');
  try{
    const r = await fetch(FN_PLAN, { method:"POST",
      headers:{ "Content-Type":"application/json", "apikey": SB_KEY, "Authorization":"Bearer "+SB_KEY },
      body: JSON.stringify({ action:"subscribe", nome, email: sp.email||S.authEmail, cpfCnpj: sp.cpf_cnpj,
        phone: sp.telefone, postalCode: sp.cep, addressNumber: sp.numero,
        card:{ holderName:nome, number:num, expiryMonth:mm, expiryYear:(aa.length===2?"20"+aa:aa), ccv:cvv } }) });
    const d = await r.json();
    if(d && d.subscriptionId){
      try{ await sb.from("shops").update({ plano_id:d.subscriptionId }).eq("id", sp.id); }catch(e){}
      sp.plano_id = d.subscriptionId; S.planForm=false; render();
    } else planMsg('<span style="color:var(--cancel)">Não deu para ativar: '+((d&&d.error)||"erro")+'</span>');
  }catch(e){ planMsg('<span style="color:var(--cancel)">Falha de conexão. Tente de novo.</span>'); }
}
async function planCancel(){
  const sp = S.dashShop || (S.myShops&&S.myShops[0]); if(!sp||!sp.plano_id) return;
  planMsg('<span class="spin" style="vertical-align:middle"></span> Cancelando…');
  try{
    await fetch(FN_PLAN, { method:"POST",
      headers:{ "Content-Type":"application/json", "apikey": SB_KEY, "Authorization":"Bearer "+SB_KEY },
      body: JSON.stringify({ action:"cancel", subscriptionId: sp.plano_id }) });
    try{ await sb.from("shops").update({ plano_id:null }).eq("id", sp.id); }catch(e){}
    sp.plano_id=null; render();
  }catch(e){ planMsg('<span style="color:var(--cancel)">Falha ao cancelar. Tente de novo.</span>'); }
}

    dica = "\n\nDica: as políticas de acesso (RLS) do Supabase estão bloqueando a gravação. Fale com o administrador para liberar a escrita nesta tabela.";
  try{ window.alert(prefix + "\n\n" + raw + dica); }catch(e){}
  return prefix + " " + raw;
}

main.addEventListener("click", e=>{

  else if(a.startsWith("s:")){ S.service=services.find(s=>s.id===a.slice(2)); S.time=null; S.dia=null; S.step=3; }
  else if(a.startsWith("d:")){ S.dia=a.slice(2); S.time=null; }
  else if(a.startsWith("t:")){ S.time=+a.slice(2); S._scrollAgendar=true; }
  else if(a==="next"){ S.step=4; S.pixGen=false; }
  else if(a==="genpix"){
    const nome=document.getElementById("pgNome"), cpf=document.getElementById("pgCpf"), zap=document.getElementById("pgZap");
    let bad=null; [nome,cpf,zap].forEach(el=>{ if(!el.value.trim()){ el.classList.add("err"); if(!bad)bad=el; } else el.classList.remove("err"); });
    if(bad){ document.getElementById("payerr").innerHTML=`<div class="errmsg">Preencha nome, CPF e WhatsApp.</div>`; bad.focus(); return; }
    S.payer={ nome:nome.value.trim(), cpf:cpf.value.trim(), zap:zap.value.trim() };
    S.pixGen=true; S.paid=false; S.pixData=null; S.pixTried=false; S.aguardandoPix=false; S.pixCreated=Date.now(); clearInterval(pixPoll); savePixPending(); render(); createPixReal(); return;

const menu = document.getElementById("menu");

function buildMenu(){

function toggleMenu(open){ const show = open===undefined ? menu.hidden : open; if(show){ buildMenu(); menu.hidden=false; } else menu.hidden=true; }
userBtn.addEventListener("click", e=>{ e.stopPropagation(); toggleMenu(); });
// Logo "SeuBarba" volta para a pagina inicial do cliente
function goHome(){
  toggleMenu(false);
  S.svcShop=null; S.svcList=null; S.barbShop=null; S.barbLinks=null; S.espEdit=null; S.editShop=null;
  S.role="client"; S.step=1; S.shop=null; S.barber=null; S.service=null; S.time=null; S.dia=null;

if(brand){

// "Minha conta": cada perfil cai na própria dashboard, na aba Conta
async function goMinhaConta(){
  toggleMenu(false); S.afterAuth=null;
  if(!S.authEmail){ S.role="account"; S.accStage="home"; S.acctType=null; render(); return; }
  routeByPerfil("conta");
}
// decide a tela conforme o perfil da conta logada
async function routeByPerfil(tab){
  const t = getPtype() || (isFreela() ? "freelancer" : "");
  if(t==="cliente"){ S.role="clientPanel"; render(); return; }
  if(t==="freelancer"){
    if(!profile) profile = loadFreela();
    if(!profile){ S.barberType="freelancer"; S.role="onboarding"; S.obStep=null; S.obDraft=null; render(); return; }
    S.role="barber"; S.tab=tab||"rede"; render(); return;
  }
  // studio (ou contas antigas sem tipo): tenta abrir a barbearia
  if(S.myShops===undefined || S.myShops===null){ await loadMyShops(); }
  if(S.myShops && S.myShops.length){ await openDash(S.myShops[0].id); if(tab){ S.tab=tab; render(); } return; }
  if(t==="studio"){ S.barberType="dono"; S.role="onboarding"; S.obStep=null; S.obDraft=null; render(); return; }
  S.role="account"; S.accStage="home"; render();
}
// Seta de voltar no cabeçalho — só aparece onde há para onde voltar
function canBack(){
  if(S.svcShop||S.barbShop||S.editShop||S.espEdit) return true;
  if(S.role==="onboarding"||S.role==="chooseType"||S.role==="cadastroEnviado"||S.role==="admin"||S.role==="barber"||S.role==="clientPanel") return true;
  if(S.role==="account") return true;
  if(S.role==="client") return !!(S.shop || S.pixGen);
  return false;
}
function navBack(){
  toggleMenu(false);
  if(S.espEdit){ S.espEdit=null; S.beEspDraft=""; render(); return; }
  if(S.svcShop){ svcExit(); return; }
  if(S.barbShop){ barbExit(); return; }
  if(S.editShop){ editExit(); return; }
  if(S.role==="onboarding"){ const seq=obSteps(); if(seq.indexOf(S.obStep)>0){ obReadStep(); obGo(-1); } else { S.role="chooseType"; render(); } return; }
  if(S.role==="chooseType"){ S.role="client"; render(); return; }
  if(S.role==="cadastroEnviado"){ S.role="client"; S.step=1; S.shop=null; render(); return; }
  if(S.role==="admin"){ S.role="account"; S.accStage="home"; render(); return; }
  if(S.role==="barber"||S.role==="clientPanel"){ goHome(); return; }
  if(S.role==="account"){ if(S.accStage==="login"||S.accStage==="signup"){ S.accStage="home"; render(); } else { S.role="client"; render(); } return; }
  if(S.role==="client"){
    if(S.pixGen){ S.pixGen=false; render(); return; }
    if(S.step>1){ S.step--; render(); return; }
    if(S.shop){ S.shop=null; S.step=1; S.barber=null; S.service=null; S.time=null; S.dia=null; render(); return; }
  }
}
function updateBack(){ const b=document.getElementById("backBtn"); if(b) b.style.display = canBack() ? "flex" : "none"; }
const backBtn = document.getElementById("backBtn");
if(backBtn) backBtn.addEventListener("click", e=>{ e.stopPropagation(); navBack(); });

menu.addEventListener("click", e=>{
  const t=e.target.closest("[data-m]"); if(!t) return;
  const m=t.dataset.m; toggleMenu(false);
  if(m==="barber"){ if(!S.authEmail){ S.role="account"; S.accStage="signup"; S.afterAuth="chooseType"; } else { S.role="chooseType"; S.barberType=null; S.obStep=null; S.obDraft=null; } render(); }
  else if(m==="client"){ S.role="client"; S.step=1; S.barber=null; S.service=null; S.time=null; S.shop=null; hydrate(); }
  else if(m==="account"){ goMinhaConta(); }
});

if(sb){ try{ refreshAuth(); sb.auth.onAuthStateChange(function(ev, session){ S.authEmail=(session&&session.user&&session.user.email)||""; S.myShops=undefined; S.myShopsPromise=null; if(ev==="SIGNED_IN" && S.loginPending){

async function hydrate(){
  if(!sb){ S.shopLoad="erro: sem conexao"; render(); return; }
  S.shopLoad="loading"; render();
  try{
    const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error("tempo esgotado, verifique sua conexao")), 12000));
    const [rShops,rSvcs,rBarbers,rLinks] = await Promise.race([Promise.all([
      sb.from('shops').select('*').eq('ativo', true),
      sb.from('services').select('*'),
      sb.from('barbers').select('*'),
      sb.from('barber_shops').select('*'),
    ]), timeout]);
    const links = rLinks.data || [];
    if(rShops.error){ S.shopLoad="erro: "+(rShops.error.message||JSON.stringify(rShops.error)); }
    else { S.shopLoad = (rShops.data && rShops.data.length) ? "ok" : "vazio"; }
    if(rShops.data){
      barbershops = rShops.data.map(s=>({ id:s.id, nome:s.nome, bairro:s.bairro||'', lat:s.lat, lng:s.lng, tel:s.telefone||'', foto:s.foto||'',
        barbers: links.filter(l=>l.shop_id===s.id).map(l=>l.barber_id), slots:true, abre:s.abre, fecha:s.fecha, almocoIni:s.almoco_ini, almocoFim:s.almoco_fim, dias:s.dias }));
    }
    if(rBarbers.data && rBarbers.data.length){
      barbers = rBarbers.data.map(b=>({ id:b.id, nome:b.nome, esp:b.especialidades||[], tel:b.telefone||'', pct:0.4 }));
    }
    if(rSvcs.data && rSvcs.data.length){
      services = rSvcs.data.map(s=>({ id:s.id, nome:s.nome, preco:Number(s.preco), dur:s.duracao_min, shop_id:s.shop_id, cat:s.categoria }));
    }
    console.log('SeuBarba: dados carregados do Supabase');
    restorePixPending();
  }catch(e){
    S.shopLoad = "erro: " + ((e && e.message) ? e.message : e);
    console.log('SeuBarba: falha ao carregar dados do Supabase', e);
  }
  render();
}

const FN_PIX = "https://xprofyturjjhzjjjvgca.supabase.co/functions/v1/swift-endpoint";
const FN_PLAN = "https://xprofyturjjhzjjjvgca.supabase.co/functions/v1/asaas-plan";
async function createPixReal(){
  try{
    const r = await fetch(FN_PIX, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "apikey": SB_KEY, "Authorization":"Bearer "+SB_KEY },
      body: JSON.stringify((function(){ const pv=precoCliente(); return { valor:pv.final, nome:S.payer.nome, cpf:S.payer.cpf, whatsapp:S.payer.zap, descricao:S.service.nome + (pv.pct?` (desconto ${pv.pct}%)`:"") }; })())
    });
    const d = await r.json();
    if(d && d.qrImage){ S.pixData = { qrImage:d.qrImage, copiaECola:d.copiaECola, paymentId:d.paymentId }; savePixPending(); startPixPoll(); }
  }catch(e){ console.log("PIX: usando simulado (funcao indisponivel)", e); }
  S.pixTried = true;
  // não re-renderizar se o pagamento já foi confirmado (não apagar a tela de sucesso)
  if(S.step===4 && S.pixGen && !S.paid) render();
}

render();
